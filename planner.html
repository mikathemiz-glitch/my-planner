<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD5;
  --border2: #C8C2B8;
  --text: #1A1814;
  --text2: #6B6560;
  --text3: #9E9890;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --teal-dark: #0F6E56;
  --blue: #2D6FBF;
  --blue-light: #E8F0FB;
  --purple: #6B4FBB;
  --purple-light: #EEEAFB;
  --amber: #B87333;
  --amber-light: #FBF0E0;
  --coral: #C0533A;
  --coral-light: #FBECE8;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; cursor: pointer; border: none; background: none; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; transition: color 0.15s; }
.nav-btn.active { color: var(--teal); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { text-transform: uppercase; }

/* PAGES */
.page { display: none; padding: 0 0 1rem; }
.page.active { display: block; }

/* HEADER */
.page-header { padding: 1.2rem 1rem 0.8rem; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
.page-header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
.page-header p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.header-row { display: flex; align-items: flex-start; justify-content: space-between; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px; margin: 0 1rem 10px; box-shadow: var(--shadow); }
.card-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px 1rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; line-height: 1.3; }

/* WEEK NAV */
.week-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 1rem 0; }
.week-nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text2); cursor: pointer; font-weight: 500; }
.week-nav-label { font-size: 13px; font-weight: 500; color: var(--text2); }

/* DAY CARDS */
.day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 0 1rem 8px; box-shadow: var(--shadow); overflow: hidden; }
.day-card.today { border-color: var(--teal); }
.day-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
.day-head-left { display: flex; align-items: center; gap: 8px; }
.day-name { font-size: 13px; font-weight: 600; color: var(--text); }
.day-date { font-size: 11px; color: var(--text3); }
.today-badge { font-size: 9px; font-weight: 600; background: var(--teal); color: white; padding: 2px 6px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; }
.task-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.day-body { padding: 8px 12px 10px; }
.task-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.task-row:last-of-type { border-bottom: none; }
.task-cb { width: 18px; height: 18px; border: 1.5px solid var(--border2); border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; background: white; transition: all 0.15s; }
.task-cb.done { background: var(--teal); border-color: var(--teal); }
.task-cb.done::after { content: ''; display: block; width: 10px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); }
.task-txt { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
.task-txt.done { color: var(--text3); text-decoration: line-through; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.add-row { display: flex; gap: 6px; margin-top: 8px; }
.add-row input { flex: 1; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); outline: none; min-width: 0; }
.add-row input:focus { border-color: var(--teal); }
.add-row button { font-size: 18px; padding: 0 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--teal); cursor: pointer; font-weight: 300; line-height: 34px; }
.collapsed .day-body { display: none; }

/* GOALS */
.goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 0 1rem 10px; box-shadow: var(--shadow); overflow: hidden; }
.goal-head { padding: 12px 14px 8px; }
.goal-title-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.goal-title { font-size: 14px; font-weight: 600; color: var(--text); }
.goal-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; }
.goal-bar-bg { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 6px; }
.goal-bar-fill { height: 4px; border-radius: 99px; transition: width 0.3s; }
.goal-pct { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.goal-steps { border-top: 1px solid var(--border); padding: 8px 14px 10px; display: flex; flex-direction: column; gap: 6px; }
.goal-step { display: flex; align-items: center; gap: 8px; }
.goal-step-txt { font-size: 12px; color: var(--text); }
.goal-step-txt.done { color: var(--text3); text-decoration: line-through; }
.add-goal-form { margin: 0 1rem 10px; display: flex; flex-direction: column; gap: 6px; }
.add-goal-form input, .add-goal-form select { font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; }
.add-goal-form input:focus { border-color: var(--teal); }
.btn { font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; }
.btn-teal { background: var(--teal); border-color: var(--teal); color: white; }
.btn-row { display: flex; gap: 6px; }

/* SCHEDULE */
.schedule-block { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.schedule-block:last-child { border-bottom: none; }
.sched-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; min-height: 36px; }
.sched-time { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); min-width: 50px; padding-top: 1px; }
.sched-label { font-size: 13px; font-weight: 600; color: var(--text); }
.sched-note { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

/* SUNDAY PLANNER */
.slot-row { display: flex; gap: 6px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
.slot-row:last-child { border-bottom: none; }
.slot-day { font-size: 12px; font-weight: 600; color: var(--text); min-width: 36px; }
.slot-date { font-size: 10px; color: var(--text3); min-width: 36px; text-align: center; }
.slot-input { flex: 1; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); outline: none; min-width: 0; }
.slot-input:focus { border-color: var(--teal); }
.slot-sel { font-size: 11px; font-family: 'DM Sans', sans-serif; padding: 6px 4px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); outline: none; width: 80px; }
.slot-done { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border2); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.slot-done.on { background: var(--teal); border-color: var(--teal); }
.slot-done.on::after { content: ''; display: block; width: 10px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); }
.slot-row.sun-row { background: var(--amber-light); border-radius: var(--radius-sm); padding: 7px 8px; margin-bottom: 2px; }
.slot-row.today-row { border-left: 3px solid var(--teal); padding-left: 6px; background: var(--teal-light); border-radius: 0 6px 6px 0; }

/* TONIGHT CARD */
.tonight-card { background: var(--teal); border-radius: var(--radius); padding: 16px; margin: 0 1rem 10px; color: white; }
.tonight-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; margin-bottom: 4px; }
.tonight-task { font-size: 17px; font-weight: 600; line-height: 1.3; }
.tonight-sub { font-size: 11px; opacity: 0.75; margin-top: 6px; }
.tonight-empty { background: var(--surface2); color: var(--text2); }

/* PROJECTS */
.proj-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; border: 1px solid var(--border); }
.proj-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.proj-status { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.proj-next { width: 100%; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); outline: none; resize: none; height: 40px; }
.proj-next:focus { border-color: var(--teal); }
.proj-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.proj-del { font-size: 14px; color: var(--text3); cursor: pointer; padding: 0 2px; background: none; border: none; line-height: 1; }

/* SECTION SPACER */
.sect { padding: 12px 1rem 6px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

/* TAG COLORS */
.tag-hp { background: var(--purple-light); color: var(--purple); }
.tag-qt { background: var(--blue-light); color: var(--blue); }
.tag-admin { background: var(--amber-light); color: var(--amber); }
.tag-free { background: var(--surface2); color: var(--text3); }
.tag-personal { background: var(--purple-light); color: var(--purple); }
.tag-family { background: var(--coral-light); color: var(--coral); }
.tag-health { background: var(--teal-light); color: var(--teal-dark); }
.tag-work { background: var(--blue-light); color: var(--blue); }

.dot-hp { background: var(--purple); }
.dot-qt { background: var(--blue); }
.dot-admin { background: var(--amber); }
.dot-free { background: var(--text3); }
.dot-personal { background: var(--purple); }
.dot-family { background: var(--coral); }
.dot-health { background: var(--teal); }
.dot-work { background: var(--blue); }

.save-btn-wrap { padding: 0 1rem; margin-bottom: 6px; }
.save-msg { font-size: 11px; color: var(--teal); text-align: center; margin-top: 6px; min-height: 16px; }
</style>
</head>
<body>

<!-- WEEK PAGE -->
<div class="page active" id="page-week">
  <div class="page-header">
    <div class="header-row">
      <div><h1>Week</h1><p id="weekRange"></p></div>
    </div>
    <div class="week-nav" style="padding: 8px 0 0;">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">← Prev</button>
      <span class="week-nav-label" id="weekLabel">This week</span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">Next →</button>
    </div>
  </div>
  <div class="stats-row" id="weekStats"></div>
  <div id="dayCards"></div>
</div>

<!-- GOALS PAGE -->
<div class="page" id="page-goals">
  <div class="page-header"><h1>Goals</h1><p>Track what matters long-term</p></div>
  <div class="sect">Add a goal</div>
  <div class="add-goal-form">
    <input id="goalTitle" placeholder="Goal title..." />
    <select id="goalCat">
      <option value="personal">Personal</option>
      <option value="family">Family</option>
      <option value="health">Health</option>
      <option value="work">Work</option>
    </select>
    <button class="btn btn-teal" onclick="addGoal()">+ Add goal</button>
  </div>
  <div class="sect">Active goals</div>
  <div id="goalsContainer"></div>
</div>

<!-- SCHEDULE PAGE -->
<div class="page" id="page-schedule">
  <div class="page-header"><h1>Daily schedule</h1><p>Your fixed day — every weekday</p></div>
  <div class="card" style="margin-top:12px">
    <div id="scheduleContainer"></div>
  </div>
</div>

<!-- SUNDAY PAGE -->
<div class="page" id="page-sunday">
  <div class="page-header">
    <div class="header-row">
      <div><h1>Evening planner</h1><p id="sundayWeekLabel"></p></div>
    </div>
    <div class="week-nav" style="padding:8px 0 0;">
      <button class="week-nav-btn" onclick="shiftSunday(-1)">← Prev</button>
      <span class="week-nav-label">Week slots</span>
      <button class="week-nav-btn" onclick="shiftSunday(1)">Next →</button>
    </div>
  </div>

  <div class="sect">Tonight</div>
  <div id="tonightCard"></div>

  <div class="sect">Evening slots</div>
  <div class="card"><div id="slotRows"></div></div>

  <div class="sect">Active projects</div>
  <div class="card">
    <div id="projectsContainer"></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <input id="projNameInput" placeholder="Project name..." style="flex:1;font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);outline:none;min-width:100px" />
      <select id="projTypeInput" style="font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);outline:none">
        <option value="hp">Houseplan</option>
        <option value="qt">Quotation</option>
      </select>
      <button class="btn btn-teal" onclick="addProject()">+ Add</button>
    </div>
  </div>

  <div class="save-btn-wrap">
    <button class="btn btn-teal" style="width:100%;font-size:14px;padding:11px" onclick="saveSunday()">Save plan</button>
    <div class="save-msg" id="saveMsg"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('week',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Week</span>
  </button>
  <button class="nav-btn" onclick="showPage('goals',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    <span>Goals</span>
  </button>
  <button class="nav-btn" onclick="showPage('schedule',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Schedule</span>
  </button>
  <button class="nav-btn" onclick="showPage('sunday',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span>Planner</span>
  </button>
</nav>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'myplanner_v1';
let state = {
  weekTasks: {},
  goals: [
    {id:1,title:'Complete 12-week workout',cat:'health',steps:['Morning KB sessions','3x cardio/week','Track progress'],stepsDone:[]},
    {id:2,title:'Quality time with Noah',cat:'family',steps:['Weekend activity together','Bedtime story daily'],stepsDone:[]},
    {id:3,title:'Grow quotation pipeline',cat:'work',steps:['2 quotes/week in evening slot','Follow up within 48h'],stepsDone:[]},
    {id:4,title:'Read 1 book per month',cat:'personal',steps:['Choose a book','Read 20 min/day'],stepsDone:[]},
  ],
  goalId: 5,
  projects: [
    {id:1,name:'Johnson residence',type:'hp',status:'In progress',next:''},
  ],
  projId: 2,
  eveningSlots: {},
  collapsed: {},
};

function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d){const p=JSON.parse(d);state=Object.assign(state,p);}}catch(e){}
}
function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}
load();

// ── HELPERS ───────────────────────────────────────────────────────────
let weekOffset=0, sundayOffset=0;
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getMonday(off){
  const d=new Date(); const day=d.getDay()||7;
  d.setDate(d.getDate()-day+1+off*7); d.setHours(0,0,0,0); return d;
}
function fmt(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function dkey(d){return d.toISOString().slice(0,10);}
function isToday(d){return dkey(d)===dkey(new Date());}
function weekDays(off){
  const m=getMonday(off);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});
}

const CAT_COLORS={
  hp:{tag:'tag-hp',dot:'dot-hp',bar:'#6B4FBB'},
  qt:{tag:'tag-qt',dot:'dot-qt',bar:'#2D6FBF'},
  admin:{tag:'tag-admin',dot:'dot-admin',bar:'#B87333'},
  free:{tag:'tag-free',dot:'dot-free',bar:'#9E9890'},
  personal:{tag:'tag-personal',dot:'dot-personal',bar:'#6B4FBB'},
  family:{tag:'tag-family',dot:'dot-family',bar:'#C0533A'},
  health:{tag:'tag-health',dot:'dot-health',bar:'#1D9E75'},
  work:{tag:'tag-work',dot:'dot-work',bar:'#2D6FBF'},
};
const TYPE_LABEL={hp:'Houseplan',qt:'Quotation',admin:'Admin',free:'Free'};
const CAT_LABEL={personal:'Personal',family:'Family',health:'Health',work:'Work'};

// ── PAGE NAV ──────────────────────────────────────────────────────────
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='week') renderWeek();
  if(name==='goals') renderGoals();
  if(name==='sunday') renderSunday();
}
window.showPage=showPage;

// ── WEEK PAGE ─────────────────────────────────────────────────────────
function shiftWeek(d){weekOffset+=d;renderWeek();}
window.shiftWeek=shiftWeek;

function renderWeek(){
  const days=weekDays(weekOffset);
  const m=days[0],su=days[6];
  document.getElementById('weekRange').textContent=fmt(m)+' – '+fmt(su);
  document.getElementById('weekLabel').textContent=weekOffset===0?'This week':weekOffset===-1?'Last week':weekOffset===1?'Next week':'Week of '+fmt(m);

  let total=0,done=0;
  days.forEach(d=>{const ts=state.weekTasks[dkey(d)]||[];total+=ts.length;done+=ts.filter(t=>t.done).length;});
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('weekStats').innerHTML=`
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Tasks</div></div>
    <div class="stat"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div>
    <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Rate</div></div>
    <div class="stat"><div class="stat-val">${state.goals.length}</div><div class="stat-lbl">Goals</div></div>
  `;

  document.getElementById('dayCards').innerHTML=days.map((d,i)=>{
    const key=dkey(d); const tasks=state.weekTasks[key]||[];
    const today=isToday(d); const col=state.collapsed[key]&&!today;
    const doneCnt=tasks.filter(t=>t.done).length;
    const taskRows=tasks.map((t,ti)=>`
      <div class="task-row">
        <div class="task-cb${t.done?' done':''}" onclick="toggleTask('${key}',${ti})"></div>
        <div class="cat-dot ${CAT_COLORS[t.cat||'personal']?.dot||'dot-personal'}"></div>
        <div class="task-txt${t.done?' done':''}">${t.text}</div>
      </div>`).join('');
    return `<div class="day-card${today?' today':''} ${col?'collapsed':''}">
      <div class="day-head" onclick="toggleCollapse('${key}')">
        <div class="day-head-left">
          <span class="day-name">${DAYS[d.getDay()]}</span>
          <span class="day-date">${fmt(d)}</span>
          ${today?'<span class="today-badge">Today</span>':''}
        </div>
        <span class="task-count">${doneCnt}/${tasks.length}</span>
      </div>
      <div class="day-body">
        ${taskRows}
        <div class="add-row">
          <input id="inp-${key}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTask('${key}')" />
          <button onclick="addTask('${key}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCollapse(key){
  state.collapsed[key]=!state.collapsed[key];
  renderWeek();
}
window.toggleCollapse=toggleCollapse;

function toggleTask(key,idx){
  if(!state.weekTasks[key]) return;
  state.weekTasks[key][idx].done=!state.weekTasks[key][idx].done;
  save(); renderWeek();
}
window.toggleTask=toggleTask;

function addTask(key){
  const inp=document.getElementById('inp-'+key);
  const val=inp.value.trim(); if(!val) return;
  if(!state.weekTasks[key]) state.weekTasks[key]=[];
  state.weekTasks[key].push({text:val,done:false,cat:'personal'});
  inp.value=''; save(); renderWeek();
}
window.addTask=addTask;

// ── GOALS PAGE ────────────────────────────────────────────────────────
function addGoal(){
  const title=document.getElementById('goalTitle').value.trim();
  const cat=document.getElementById('goalCat').value;
  if(!title) return;
  state.goals.push({id:state.goalId++,title,cat,steps:[],stepsDone:[]});
  document.getElementById('goalTitle').value='';
  save(); renderGoals();
}
window.addGoal=addGoal;

function toggleGoalStep(gid,si){
  const g=state.goals.find(x=>x.id===gid); if(!g) return;
  if(!g.stepsDone) g.stepsDone=[];
  const idx=g.stepsDone.indexOf(si);
  if(idx>-1) g.stepsDone.splice(idx,1); else g.stepsDone.push(si);
  save(); renderGoals();
}
window.toggleGoalStep=toggleGoalStep;

function deleteGoal(id){
  state.goals=state.goals.filter(g=>g.id!==id);
  save(); renderGoals();
}
window.deleteGoal=deleteGoal;

function renderGoals(){
  document.getElementById('goalsContainer').innerHTML=state.goals.map(g=>{
    const c=CAT_COLORS[g.cat]||CAT_COLORS.personal;
    const steps=g.steps||[]; const done=(g.stepsDone||[]).length;
    const pct=steps.length?Math.round(done/steps.length*100):0;
    const stepRows=steps.map((s,i)=>{
      const isDone=(g.stepsDone||[]).includes(i);
      return `<div class="goal-step">
        <div class="task-cb${isDone?' done':''}" style="width:16px;height:16px" onclick="toggleGoalStep(${g.id},${i})"></div>
        <span class="goal-step-txt${isDone?' done':''}">${s}</span>
      </div>`;
    }).join('');
    return `<div class="goal-card">
      <div class="goal-head">
        <div class="goal-title-row">
          <span class="goal-title">${g.title}</span>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="goal-tag ${c.tag}">${CAT_LABEL[g.cat]||g.cat}</span>
            <button onclick="deleteGoal(${g.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px">×</button>
          </div>
        </div>
        <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%;background:${c.bar}"></div></div>
        <div class="goal-pct">${pct}% complete</div>
      </div>
      ${stepRows?`<div class="goal-steps">${stepRows}</div>`:''}
    </div>`;
  }).join('');
}

// ── SCHEDULE PAGE ─────────────────────────────────────────────────────
const SCHEDULE=[
  {time:'05:00',label:'Wake up + workout',note:'Kettlebell 20 min',cat:'health'},
  {time:'05:20',label:'Shower + breakfast prep',note:'Prep Noah for school',cat:'family'},
  {time:'07:20',label:'Leave home',note:'Drop Noah at day care 07:50',cat:'family'},
  {time:'08:00',label:'Work starts',note:'',cat:'work'},
  {time:'15:30',label:'Cardio (3× per week)',note:'4 km walk → run at work',cat:'health'},
  {time:'16:10',label:'Off work',note:'Commute home',cat:'work'},
  {time:'16:45',label:'Arrive home',note:'',cat:'personal'},
  {time:'17:00',label:'Family time',note:'Noah, tea, wife — protected',cat:'family'},
  {time:'20:00',label:'Dinner',note:'',cat:'family'},
  {time:'20:50',label:'Tonight confirmation',note:'2 min: check Sunday plan, confirm task',cat:'work'},
  {time:'21:00',label:'Evening deep work',note:'Houseplans / quotations — 50 min',cat:'work'},
  {time:'21:50',label:'Close down',note:'Save files, write where you stopped, check Noah\'s morning',cat:'personal'},
  {time:'22:30',label:'Lights out',note:'Protects the 05:00 wake-up',cat:'health'},
];
function renderSchedule(){
  document.getElementById('scheduleContainer').innerHTML=SCHEDULE.map(s=>{
    const c=CAT_COLORS[s.cat]||CAT_COLORS.personal;
    return `<div class="schedule-block">
      <div class="sched-bar" style="background:${c.bar}"></div>
      <div class="sched-time">${s.time}</div>
      <div><div class="sched-label">${s.label}</div>${s.note?`<div class="sched-note">${s.note}</div>`:''}</div>
    </div>`;
  }).join('');
}
renderSchedule();

// ── SUNDAY / EVENING PLANNER ──────────────────────────────────────────
function shiftSunday(d){sundayOffset+=d;renderSunday();}
window.shiftSunday=shiftSunday;

function slotKey(off){return 'slots_w'+off;}

function saveSunday(){
  const sk=slotKey(sundayOffset);
  if(!state.eveningSlots[sk]) state.eveningSlots[sk]={};
  weekDays(sundayOffset).forEach((d,i)=>{
    const inp=document.getElementById('s-inp-'+i);
    const sel=document.getElementById('s-sel-'+i);
    const btn=document.getElementById('s-done-'+i);
    if(inp) state.eveningSlots[sk][i]={task:inp.value,type:sel?sel.value:'hp',done:btn?btn.classList.contains('on'):false};
  });
  state.projects.forEach(p=>{
    const el=document.getElementById('pnext-'+p.id); if(el) p.next=el.value;
  });
  save();
  const msg=document.getElementById('saveMsg');
  msg.textContent='Saved '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  setTimeout(()=>{msg.textContent='';},3000);
}
window.saveSunday=saveSunday;

function toggleSlotDone(i){
  const btn=document.getElementById('s-done-'+i); if(!btn) return;
  btn.classList.toggle('on');
}
window.toggleSlotDone=toggleSlotDone;

function addProject(){
  const name=document.getElementById('projNameInput').value.trim();
  const type=document.getElementById('projTypeInput').value;
  if(!name) return;
  state.projects.push({id:state.projId++,name,type,status:'Active',next:''});
  document.getElementById('projNameInput').value='';
  save(); renderSunday();
}
window.addProject=addProject;

function deleteProject(id){
  state.projects=state.projects.filter(p=>p.id!==id);
  save(); renderSunday();
}
window.deleteProject=deleteProject;

function renderSunday(){
  const days=weekDays(sundayOffset);
  const m=days[0],su=days[6];
  document.getElementById('sundayWeekLabel').textContent=fmt(m)+' – '+fmt(su);
  const sk=slotKey(sundayOffset);
  const slots=state.eveningSlots[sk]||{};

  // tonight card
  let tonightIdx=null;
  days.forEach((d,i)=>{if(isToday(d)) tonightIdx=i;});
  const tc=document.getElementById('tonightCard');
  if(tonightIdx!==null){
    const s=slots[tonightIdx]||{task:'',type:'hp',done:false};
    const inp=document.getElementById('s-inp-'+tonightIdx);
    const task=inp?inp.value:s.task;
    if(task){
      const c=CAT_COLORS[s.type||'hp'];
      tc.innerHTML=`<div class="tonight-card">
        <div class="tonight-label">Tonight — 21:00</div>
        <div class="tonight-task">${task}</div>
        <div class="tonight-sub">${TYPE_LABEL[s.type||'hp']} · Sit down at 21:00 · stop at 21:50</div>
      </div>`;
    } else {
      tc.innerHTML=`<div class="tonight-card tonight-empty" style="margin:0 1rem 10px;padding:14px;border-radius:12px;border:1px solid var(--border)"><div style="font-size:12px;color:var(--text2)">No task assigned for tonight — fill in your slot below.</div></div>`;
    }
  } else {
    tc.innerHTML=`<div style="padding:0 1rem 4px"><div style="font-size:12px;color:var(--text3)">Navigate to the current week to see tonight's task.</div></div>`;
  }

  // slot rows — Mon–Sun
  const dayOrder=[1,2,3,4,5,6,0]; // Mon first
  const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('slotRows').innerHTML=days.map((d,i)=>{
    const s=slots[i]||{task:'',type:'hp',done:false};
    const today=isToday(d);
    const isSun=d.getDay()===0;
    return `<div class="slot-row${isSun?' sun-row':''}${today?' today-row':''}">
      <div>
        <div class="slot-day">${DAYS[d.getDay()]}</div>
        <div class="slot-date">${fmt(d)}</div>
      </div>
      <input class="slot-input" id="s-inp-${i}" value="${s.task||''}" placeholder="${isSun?'Planning session':'Tonight\'s task...'}" />
      <select class="slot-sel" id="s-sel-${i}">
        <option value="hp"${(s.type||'hp')==='hp'?' selected':''}>Houseplan</option>
        <option value="qt"${s.type==='qt'?' selected':''}>Quotation</option>
        <option value="admin"${s.type==='admin'?' selected':''}>Admin</option>
        <option value="free"${s.type==='free'?' selected':''}>Free</option>
      </select>
      <button class="slot-done${s.done?' on':''}" id="s-done-${i}" onclick="toggleSlotDone(${i})"></button>
    </div>`;
  }).join('');

  // projects
  document.getElementById('projectsContainer').innerHTML=state.projects.map(p=>{
    const c=CAT_COLORS[p.type]||CAT_COLORS.hp;
    return `<div class="proj-card">
      <div class="proj-head">
        <div>
          <span class="goal-tag ${c.tag}" style="font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">${TYPE_LABEL[p.type]}</span>
          <div class="proj-name" style="margin-top:3px">${p.name}</div>
          <div class="proj-status">${p.status}</div>
        </div>
        <button class="proj-del" onclick="deleteProject(${p.id})">×</button>
      </div>
      <textarea class="proj-next" id="pnext-${p.id}" placeholder="Next task this week...">${p.next||''}</textarea>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────
renderWeek();
renderGoals();
</script>
</body>
</html>
